name: Deploy to all platforms

on:
  push:
    branches: [master]

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

jobs:
  deploy-cloudflare:
    name: Cloudflare Workers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - run: npx wrangler deploy --name velvet-note-app
      - run: npx wrangler deploy --name amber-tide-hub
      - run: npx wrangler deploy --name cedar-tools-app
      - run: npx wrangler deploy --name maple-stream
      - run: npx wrangler deploy --name cobalt-lens-app
      - run: npx wrangler deploy --name indigo-wave
      - run: npx wrangler deploy --name onyx-path-hub
      - run: npx wrangler deploy --name prism-gate-app
      - run: npx wrangler deploy --name quartz-hub
      - run: npx wrangler deploy --name lunar-stack-app
