name: Deploy to all platforms

on:
  push:
    branches: [master]

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

jobs:
  deploy-cloudflare:
    name: Cloudflare Workers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - run: npx wrangler deploy --name study-hub-app
      - run: npx wrangler deploy --name homework-desk
      - run: npx wrangler deploy --name class-resource-hub
      - run: npx wrangler deploy --name note-helper-app
      - run: npx wrangler deploy --name learn-assist-tool
      - run: npx wrangler deploy --name edu-toolkit-app
      - run: npx wrangler deploy --name desk-helper-hub
      - run: npx wrangler deploy --name quick-search-tool
      - run: npx wrangler deploy --name browse-assist-app
      - run: npx wrangler deploy --name net-tool-hub
