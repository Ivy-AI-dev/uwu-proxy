name: Deploy to all platforms

on:
  push:
    branches: [master]

jobs:
  deploy-cloudflare:
    name: Cloudflare Workers (multiple instances)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run build

      # Deploy 8 separate worker instances — each gets its own URL
      - name: Deploy uwu-proxy (main)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --name uwu-proxy
        env:
          GROQ_API_KEY:  ${{ secrets.GROQ_API_KEY }}
          TMDB_API_KEY:  ${{ secrets.TMDB_API_KEY }}

      - name: Deploy uwu-proxy-2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --name uwu-proxy-2
        env:
          GROQ_API_KEY:  ${{ secrets.GROQ_API_KEY }}
          TMDB_API_KEY:  ${{ secrets.TMDB_API_KEY }}

      - name: Deploy uwu-proxy-3
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --name uwu-proxy-3
        env:
          GROQ_API_KEY:  ${{ secrets.GROQ_API_KEY }}
          TMDB_API_KEY:  ${{ secrets.TMDB_API_KEY }}

      - name: Deploy uwu-proxy-4
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --name uwu-proxy-4
        env:
          GROQ_API_KEY:  ${{ secrets.GROQ_API_KEY }}
          TMDB_API_KEY:  ${{ secrets.TMDB_API_KEY }}

      - name: Deploy uwu-proxy-5
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --name uwu-proxy-5
        env:
          GROQ_API_KEY:  ${{ secrets.GROQ_API_KEY }}
          TMDB_API_KEY:  ${{ secrets.TMDB_API_KEY }}

      - name: Deploy study-hub-app
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --name study-hub-app
        env:
          GROQ_API_KEY:  ${{ secrets.GROQ_API_KEY }}
          TMDB_API_KEY:  ${{ secrets.TMDB_API_KEY }}

      - name: Deploy homework-helper-app
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --name homework-helper-app
        env:
          GROQ_API_KEY:  ${{ secrets.GROQ_API_KEY }}
          TMDB_API_KEY:  ${{ secrets.TMDB_API_KEY }}

      - name: Deploy class-notes-hub
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --name class-notes-hub
        env:
          GROQ_API_KEY:  ${{ secrets.GROQ_API_KEY }}
          TMDB_API_KEY:  ${{ secrets.TMDB_API_KEY }}
